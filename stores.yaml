# Filialen im 25-km-Umkreis von 74321 Bietigheim-Bissingen.
#
# Je Eintrag:
#   id            ketteninterne Store-ID für die Bestandsabfrage. DARF leer
#                 bleiben – dann ist die Filiale recherchiert, wird aber bis
#                 zum Nachtragen der ID übersprungen (kein Fehlalarm).
#   name          Anzeigename (Telegram/Logs).
#   lat/lon       Koordinaten der Filiale. Fehlt distance_km, wird die
#                 Entfernung daraus + den Koordinaten in config.yaml berechnet.
#   distance_km   optional fest vorgeben (überschreibt die Berechnung).
#
# Aktuell liefern nur die MediaMarkt-/Saturn-Adapter einen Filialbestand
# (GraphQL-API). OBI/Bauhaus/Hornbach prüfen bisher nur Online-Verfügbarkeit –
# ihre Filiallisten sind hier als Platzhalter vorbereitet.
#
# So an die MediaMarkt/Saturn-Store-ID kommen: Store-Finder öffnen
# (https://www.mediamarkt.de/de/storefinder), Filiale wählen, die Zahl am Ende
# der Store-URL (…/store/<NAME>-<ID>) ist die ID. Diese unten bei `id:` eintragen.
# Die Koordinaten unten sind grobe Filialstandorte – bei Bedarf verfeinern.

mediamarkt:
  - id: ""            # TODO: Store-ID eintragen (Store-Finder)
    name: "Ludwigsburg"
    lat: 48.9018
    lon: 9.1660
  - id: ""            # TODO
    name: "Stuttgart Milaneo"
    lat: 48.7930
    lon: 9.1860

saturn:
  - id: ""            # TODO
    name: "Stuttgart Königstraße"
    lat: 48.7770
    lon: 9.1790

obi: []

bauhaus: []

hornbach: []
