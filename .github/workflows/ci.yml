name: CI (Tests)

# Führt die Test-Suite bei jedem Push und Pull Request aus. Schnell und
# netzwerkfrei – die Tests mocken alle externen Aufrufe (kein Playwright nötig).

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhängigkeiten installieren
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Tests
        run: python -m pytest -q
