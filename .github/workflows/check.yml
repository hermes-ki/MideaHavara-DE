name: Midea PortaSplit Verfügbarkeit

on:
  schedule:
    # Alle 10 Minuten (UTC). GitHub  kann den Start unter Last leicht verzögern.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}  # manueller Start für Tests

# Erlaubt dem Workflow, den aktualisierten state.json zurück zu committen.
permissions:
  contents: write

concurrency:
  group: midea-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8  # Sicherheitsnetz: bricht ab, falls ein Shop hängt
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Chromium für Browser-Fallback installieren
        run: python -m playwright install --with-deps chromium

      - name: Verfügbarkeit prüfen
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m tracker.run

      - name: State zurück committen
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "chore: update availability state [skip ci]"
            git push
          else
            echo "Kein State-Update."
          fi
