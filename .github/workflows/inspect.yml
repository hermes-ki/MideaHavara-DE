name: Diagnose Shops

# Gibt pro Shop die echten  Kaufbarkeits-Signale aus (zum Kalibrieren der
# Adapter). Nur manuell auslösbar, sendet nichts.
on:
  workflow_dispatch: {}

jobs:
  inspect:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Chromium installieren
        run: python -m playwright install --with-deps chromium
      - name: Diagnose
        run: python -m tracker.inspect
