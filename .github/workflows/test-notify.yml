name: Test-Alarm senden

# Schickt einmalig einen  Beispiel-Alarm an Telegram, um den kompletten
# Benachrichtigungsweg bis aufs Handy zu prüfen. Nur manuell auslösbar.
on:
  workflow_dispatch: {}

jobs:
  test-notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt
      - name: Test-Alarm senden
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m tracker.run --demo
