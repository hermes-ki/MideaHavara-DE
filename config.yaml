# Konfiguration des Verfügbarkeits-Trackers. Anpassbar ohne Code-Änderung.
#
# Die Watchlist (products) kann beliebig viele Geräte enthalten – jeder
# Eintrag bringt seine eigenen Shop-URLs mit. Die globalen Blöcke
# (location, sources) gelten für alle Produkte.

products:
  - name: "Midea PortaSplit 12.000 BTU"
    # Strikter Anker, damit nie das falsche/zu teure Gerät matcht.
    # Bestätigte EAN der gesuchten Midea PortaSplit 12.000 BTU.
    eans:
      - "4048164116478"
    # Schlüsselwörter für den Fallback-Titelabgleich, falls eine Quelle keine
    # EAN liefert. ALLE müssen (case-insensitiv) im Titel vorkommen.
    title_must_include:
      - "portasplit"
    # Schließt die teure Alt-Variante zusätzlich über den Titel aus.
    title_must_exclude:
      - "comfee"
    max_price: 800.0  # EUR – nur Angebote darunter lösen aus
    allow_used: true  # Amazon Warehouse / gebrauchte Artikel erlauben
    # Pro Quelle die direkte Produkt-URL. Leere/fehlende Werte = übersprungen.
    urls:
      geizhals: "https://geizhals.de/midea-comfee-porta-split-a3201826.html?hloc=de&hloc=at"
      idealo: "https://www.idealo.de/preisvergleich/OffersOfProduct/204374464.html"
      mediamarkt: "https://www.mediamarkt.de/de/product/_midea-porta-split-klimaanlage-grau-max-raumgrosse-42-m-eek-a-142245268.html"
      saturn: "https://www.saturn.de/de/product/_midea-porta-split-klimaanlage-grau-max-raumgrosse-42-m-eek-a-142245268.html"
      obi: "https://www.obi.de/p/8620890/midea-mobile-split-klimaanlage-portasplit"
      bauhaus: "https://www.bauhaus.info/klimaanlagen/midea-klimasplitgeraet-portasplit-12000-btu/p/31934233"
      hornbach: "https://www.hornbach.de/p/klimasplitgeraet-midea-portasplit-12-000-btu-105-m-weiss/12356554/"
      amazon: "https://www.amazon.de/dp/B0D3PP64JS"

  # Weiteres Gerät? Einfach einen zweiten Eintrag nach demselben Muster anlegen:
  # - name: "Beispiel-Klimagerät"
