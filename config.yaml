# Konfiguration des Verfügbarkeits-Trackers. Anpassbar ohne Code-Änderung.
#
# Die Watchlist (products) kann beliebig viele Geräte enthalten – jeder
# Eintrag bringt seine eigenen Shop-URLs mit. Die globalen Blöcke
# (location, sources) gelten für alle Produkte.

products:
  - name: "Midea PortaSplit 12.000 BTU"
    # Strikter Anker, damit nie das falsche/zu teure Gerät matcht.
    # Bestätigte EAN der gesuchten Midea PortaSplit 12.000 BTU.
    eans:
      - "4048164116478"
    # Schlüsselwörter für den Fallback-Titelabgleich, falls eine Quelle keine
    # EAN liefert. ALLE müssen (case-insensitiv) im Titel vorkommen.
    title_must_include:
      - "portasplit"
    # Hinweis: Das Zielgerät (EAN 4048164116478) IST Comfee-gebrandet
    # ("Midea Comfee PortaSplit"), daher KEIN comfee-Ausschluss. Der EAN-Abgleich
    # ist der starke Anker; ohne EAN greift der Titel ("portasplit").
    title_must_exclude: []
    max_price: 1000.0  # EUR – nur Angebote darunter lösen aus
    allow_used: true  # Amazon Warehouse / gebrauchte Artikel erlauben
    # Pro Quelle die direkte Produkt-URL. Leere/fehlende Werte = übersprungen.
    urls:
      geizhals: ""
      idealo: ""
      mediamarkt: "https://www.mediamarkt.at/de/product/_midea-portasplit-mobile-klimaanlage-max-raumgrosse-42-m-eek-a-12000-btuh-weiss-2075674.html"
      saturn: ""
      obi: "https://www.obi.at/p/3586245/midea-mobile-split-klimaanlage-portasplit"
      bauhaus: "https://www.bauhaus.at/p/31934233"
      hornbach: ""
      amazon: ""

  # Weiteres Gerät? Einfach einen zweiten Eintrag nach demselben Muster anlegen:
  # - name: "Beispiel-Klimagerät"
  #   eans:
  #     - "0000000000000"
  #   title_must_include:
  #     - "beispiel"
  #   title_must_exclude: []
  #   max_price: 600.0
  #   allow_used: false
  #   urls:
  #     idealo: "https://www.idealo.de/preisvergleich/OffersOfProduct/…"

location:
  postal_code: "74321"
  city: "Bietigheim-Bissingen"
  latitude: 48.9543
  longitude: 9.1316
  radius_km: 25  # Umkreis für Filial-Verfügbarkeit

# Quellen ein-/ausschalten. Schlüssel entsprechen den Adapter-Namen.
sources:
  geizhals: false
  idealo: false
  mediamarkt: true
  saturn: false
  obi: true
  bauhaus: true
  hornbach: false
  amazon: false

# Tägliche "lebt noch"-Statusmeldung via Telegram (günstigster Preis je Gerät,
# Quellen mit Daten). Zusätzlich ein Sofort-Alarm bei Totalausfall (keine
# einzige Quelle lieferte Daten). Beides ist auf max. 1x/Tag entprellt.
heartbeat:
  enabled: true
  hour_utc: 6  # erste Meldung am/nach dieser UTC-Stunde (6 ≈ 8 Uhr MESZ)
