location:
  postal_code: "74321"
  city: "Bietigheim-Bissingen"
  latitude: 48.9543
  longitude: 9.1316
  radius_km: 25  # Umkreis für Filial-Verfügbarkeit

# Quellen ein-/ausschalten. Schlüssel entsprechen den Adapter-Namen.
sources:
  geizhals: true  # Achtung: hinterlegte URL ist die Comfee-Variante (s.o.)
  idealo: true
  mediamarkt: true
  saturn: true
  obi: true
  bauhaus: true
  hornbach: true
  amazon: true
